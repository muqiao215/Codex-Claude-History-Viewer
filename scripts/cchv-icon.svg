<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="8" y="8" width="240" height="120" rx="50" ry="50" fill="url(#face)"/>

  <!-- Clock outer ring -->
  <circle cx="128" cy="128" r="78" fill="none" stroke="#ffffff" stroke-width="9" stroke-opacity="0.95"/>

  <!-- Hour ticks (12, 3, 6, 9) -->
  <rect x="125" y="56" width="6" height="14" rx="2" fill="#ffffff"/>
  <rect x="186" y="125" width="14" height="6" rx="2" fill="#ffffff"/>
  <rect x="125" y="186" width="6" height="14" rx="2" fill="#ffffff"/>
  <rect x="56" y="125" width="14" height="6" rx="2" fill="#ffffff"/>

  <!-- Hour hand (10 o'clock direction) -->
  <line x1="128" y1="128" x2="92" y2="98" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>

  <!-- Minute hand (toward 2) -->
  <line x1="128" y1="128" x2="166" y2="92" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>

  <!-- Center pivot -->
  <circle cx="128" cy="128" r="8" fill="#ffffff"/>
  <circle cx="128" cy="128" r="3.5" fill="#1d4ed8"/>

  <!-- Counter-clockwise history arrow wrapping the clock -->
  <path d="M 198 70
           A 86 86 0 1 0 214 144"
        fill="none" stroke="#fde68a" stroke-width="11" stroke-linecap="round"/>
  <!-- Arrow head -->
  <path d="M 198 70 L 184 50 L 220 50 Z" fill="#fde68a" stroke="#fde68a" stroke-width="2" stroke-linejoin="round"/>
</svg>
